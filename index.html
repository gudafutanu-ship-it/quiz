<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="apple-touch-icon" href="theme100.png">
  <link rel="icon" type="image/png" href="theme100.png">

<title>フラッシュ100クイズ</title>

<style>
body{margin:0;font-family:sans-serif;background:#12243b;color:white;text-align:center}
.app{max-width:600px;margin:auto;padding:10px}
.panel{background:#34445b;border-radius:20px;padding:15px;margin:10px 0}
select,button{font-size:16px;padding:10px;border-radius:10px;border:none;margin:5px}
button{cursor:pointer}
.start{background:#06d6a0}
.next{background:#ffd166}
.stop{background:#ef476f;color:white}
.choice{display:block;background:white;color:black;margin:10px auto;padding:12px;border-radius:10px;min-width:70%}
.correct{background:#06d6a0!important}
.wrong{background:#ef476f!important;color:white!important}
#question{white-space:pre-line;font-size:18px;margin:10px 0;line-height:1.7}
.result{font-size:20px;font-weight:bold}
.info{font-size:15px;font-weight:bold;color:#ffe8a3;margin-top:6px}
#speedButtons button{background:#ddd;color:#111;font-weight:bold}
#quizImage{display:none;max-width:90%;max-height:190px;border-radius:14px;margin:10px auto}
.link{display:none;color:#9bf6ff;font-weight:bold;margin-top:12px}
</style>
</head>

<body>
<div class="app">

<h1>フラッシュ100クイズ</h1>

<div class="panel">
  <select id="theme"></select>
  <select id="mode">
    <option value="card">カード</option>
    <option value="quiz">問題</option>
  </select>

  <div class="info" id="countInfo">0枚</div>

  <div id="speedButtons">
    <button onclick="setSpeed(0,this)">手動</button>
    <button onclick="setSpeed(0.5,this)">0.5秒</button>
    <button onclick="setSpeed(1,this)">1秒</button>
    <button onclick="setSpeed(2,this)">2秒</button>
  </div>

  <button id="voiceBtn" onclick="toggleVoice()">🔇 音声OFF</button>
  <button onclick="resetScore()">リセット</button>

  <br>

  <button class="start" onclick="start()">スタート</button>
  <button class="next" onclick="next()">次へ</button>
  <button class="stop" onclick="stop()">ストップ</button>

  <div class="info">
    正解:<span id="ok">0</span>
    不正解:<span id="ng">0</span>
    進捗:<span id="progressInfo">0 / 0</span>
  </div>
</div>

<div class="panel">
  <img id="quizImage" alt="">
  <div id="question">読み込み中...</div>
  <div id="choices"></div>
  <div id="result" class="result"></div>
  <a id="link" class="link" href="#" target="_blank" rel="noopener">詳しく見る</a>
</div>

</div>

<script>
const WORKER_BASE="https://flag-flash.gudafutanu.workers.dev";

const THEMES=[
  {key:"museum",label:"博物館"},
  {key:"composer",label:"作曲家"},
  {key:"dodgers",label:"ドジャース"},
  {key:"dinosaur",label:"恐竜"},
  {key:"flags",label:"国旗"},
  {key:"animal",label:"動物"},
  {key:"flower",label:"花"}
];

const themeEl=document.getElementById("theme");
const modeEl=document.getElementById("mode");
const questionEl=document.getElementById("question");
const choicesEl=document.getElementById("choices");
const resultEl=document.getElementById("result");
const linkEl=document.getElementById("link");
const countInfoEl=document.getElementById("countInfo");
const progressInfoEl=document.getElementById("progressInfo");
const quizImageEl=document.getElementById("quizImage");

let data=[];
let index=0;
let timer=null;
let ok=0;
let ng=0;
let speed=0;
let voiceOn=false;

function buildTheme(){
  themeEl.innerHTML="";
  THEMES.forEach(t=>{
    const opt=document.createElement("option");
    opt.value=t.key;
    opt.textContent=t.label;
    themeEl.appendChild(opt);
  });
}

function themeLabel(key){
  const t=THEMES.find(x=>x.key===key);
  return t ? t.label : key;
}

async function loadData(){
  stop();
  const key=themeEl.value;

  questionEl.textContent="読み込み中...";
  choicesEl.innerHTML="";
  resultEl.textContent="";
  linkEl.style.display="none";
  quizImageEl.style.display="none";

  try{
    const res=await fetch(`${WORKER_BASE}/data?key=${encodeURIComponent(key)}`);
    if(!res.ok) throw new Error("読み込み失敗");

    data=await res.json();
    index=0;

    countInfoEl.textContent=`${themeLabel(key)}（${data.length}枚）`;
    updateProgress();
    show();

  }catch(e){
    questionEl.textContent="読み込み失敗";
    countInfoEl.textContent="0枚";
    progressInfoEl.textContent="0 / 0";
  }
}

function updateProgress(){
  if(!data.length){
    progressInfoEl.textContent="0 / 0";
    return;
  }
  progressInfoEl.textContent=`${index+1} / ${data.length}`;
}

function show(){
  if(!data.length)return;

  resultEl.textContent="";
  choicesEl.innerHTML="";
  linkEl.style.display="none";
  quizImageEl.style.display="none";
  updateProgress();

  const item=data[index];

  if(modeEl.value==="card"){
    showCard(item);
  }else{
    makeQuiz(item);
  }
}

function showCard(item){
  questionEl.textContent=
    (item.word || "") + "\n\n" +
    (item.meaning || "") + "\n\n" +
    (item.note || "");

  if(item.image){
    quizImageEl.src=item.image;
    quizImageEl.style.display="block";
  }

  if(item.link){
    linkEl.href=item.link;
    linkEl.style.display="inline-block";
  }

  speak((item.word || "") + "。" + (item.meaning || ""));
}

function makeQuiz(item){
  const isFlag = themeEl.value === "flags";

  let correct=item.word || "";
  let q="";

  if(isFlag){
    q="この国旗はどこの国の国旗でしょう？";

    if(item.image){
      quizImageEl.src=item.image;
      quizImageEl.style.display="block";
    }
  }else{
    q="問題：次の説明に当てはまるものはどれ？\n\n" + (item.note || "");
  }

  questionEl.textContent=q;
  speak(q);

  let choices=[item];

  while(choices.length<Math.min(4,data.length)){
    const r=data[Math.floor(Math.random()*data.length)];
    if(!choices.some(c=>c.word===r.word)){
      choices.push(r);
    }
  }

  choices.sort(()=>Math.random()-0.5);

  choices.forEach(choice=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.textContent=choice.word;

    btn.onclick=()=>{
      document.querySelectorAll(".choice").forEach(b=>b.disabled=true);

      if(choice.word===correct){
        btn.classList.add("correct");
        resultEl.textContent="正解！";
        ok++;
      }else{
        btn.classList.add("wrong");
        resultEl.textContent="残念 正解："+correct;
        ng++;

        document.querySelectorAll(".choice").forEach(b=>{
          if(b.textContent===correct){
            b.classList.add("correct");
          }
        });
      }

      document.getElementById("ok").textContent=ok;
      document.getElementById("ng").textContent=ng;

      if(item.link){
        linkEl.href=item.link;
        linkEl.style.display="inline-block";
      }
    };

    choicesEl.appendChild(btn);
  });
}

function next(){
  if(!data.length)return;

  if(index >= data.length-1){
    stop();
    questionEl.textContent=
      `🎉 終了です\n\n${themeLabel(themeEl.value)}のカードは最後まで終わりました。\n\nもう一度見る場合は「スタート」を押してください。`;
    choicesEl.innerHTML="";
    resultEl.textContent="";
    linkEl.style.display="none";
    quizImageEl.style.display="none";
    progressInfoEl.textContent=`${data.length} / ${data.length}`;
    speak("終了です。カードは最後まで終わりました。");
    return;
  }

  index++;
  show();
}

function start(){
  stop();
  index=0;
  show();

  if(speed>0){
    timer=setInterval(next,speed*1000);
  }
}

function stop(){
  if(timer){
    clearInterval(timer);
    timer=null;
  }
}

function setSpeed(s,btn){
  speed=s;

  document.querySelectorAll("#speedButtons button").forEach(b=>{
    b.style.background="#ddd";
  });

  if(btn) btn.style.background="#06d6a0";

  if(timer){
    start();
  }
}

function toggleVoice(){
  voiceOn=!voiceOn;
  document.getElementById("voiceBtn").textContent=
    voiceOn ? "🔊 音声ON" : "🔇 音声OFF";
}

function speak(text){
  if(!voiceOn)return;
  if(!text)return;

  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.rate=0.9;
  speechSynthesis.speak(u);
}

function resetScore(){
  ok=0;
  ng=0;
  document.getElementById("ok").textContent=0;
  document.getElementById("ng").textContent=0;
  resultEl.textContent="点数をリセットしました";
}

buildTheme();
loadData();

themeEl.onchange=loadData;
modeEl.onchange=show;
</script>
</body>
</html>
